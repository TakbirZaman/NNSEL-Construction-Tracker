services:
  - type: web
    name: constructtrack
    env: node
    region: singapore
    buildCommand: cd frontend && npm ci && npm run build && cd ../backend && npm ci --omit=dev
    startCommand: cd backend && node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: constructtrack-db
          property: connectionString
      - key: PUBLIC_DIR
        value: ../frontend/dist

databases:
  - name: constructtrack-db
    region: singapore
    plan: free
    databaseName: constructtrack
    ipAllowList: []
